<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-custom {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .navbar-brand {
            color: #667eea !important;
            font-weight: 700;
            font-size: 1.5rem;
        }
        .container-main {
            margin-top: 60px;
            padding: 20px;
        }
        .welcome-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin-bottom: 30px;
            animation: slideIn 0.5s ease-in;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .welcome-card h1 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .welcome-card p {
            color: #6c757d;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .user-info p, .user-info span {
            color: #ffffff;
        }
        .welcome-content {
            display:flex;
            gap:20px;
            align-items:flex-start;
            flex-wrap:wrap;
        }
        .profile-card {
            width:160px;
            min-width:160px;
            background: #ffffff;
            border-radius:10px;
            padding:12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            text-align:center;
        }
        .profile-card img {
            width:140px;
            height:140px;
            border-radius:12px;
            object-fit:cover;
            display:block;
            margin:0 auto 8px auto;
        }
        .profile-actions {
            display:flex;
            gap:8px;
            justify-content:center;
            margin-top:8px;
        }
        @media (max-width: 768px) {
            .welcome-content { flex-direction:column; }
            .profile-card { width:100%; min-width:unset; }
        }
        .user-info p {
            margin: 10px 0;
            font-size: 1rem;
        }
        .btn-logout {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 10px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
            text-decoration: none;
        }
        .menu-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .menu-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .menu-card i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }
        .menu-card h5 {
            color: #2d3748;
            font-weight: 600;
            margin-top: 10px;
        }
        .menu-card p {
            color: #6c757d;
            font-size: 0.9rem;
            margin: 10px 0 0 0;
        }
        .alert {
            border-radius: 10px;
            border: none;
            margin-bottom: 20px;
        }
        .pedidos-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-top: 40px;
            animation: slideIn 0.5s ease-in;
        }
        .pedidos-section h2 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .pedido-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pedido-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }
        .pedido-info {
            flex: 1;
        }
        .pedido-numero {
            font-weight: 700;
            color: #667eea;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .pedido-detalle {
            color: #6c757d;
            font-size: 0.95rem;
            margin: 3px 0;
        }
        .pedido-total {
            font-size: 1.3rem;
            font-weight: 700;
            color: #667eea;
            margin-left: 20px;
            text-align: right;
        }
        .badge-estado {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .badge-pendiente {
            background-color: #fff3cd;
            color: #856404;
        }
        .badge-completado {
            background-color: #d4edda;
            color: #155724;
        }
        .sin-pedidos {
            background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: #6c757d;
        }
        .sin-pedidos i {
            font-size: 3rem;
            color: #adb5bd;
            margin-bottom: 15px;
        }
    </style>

</head>
<body>
<!-- Header -->
<div th:insert="fragments/header :: header"></div>

<div class="container-main">
        <div class="welcome-card" style="position:relative;">
        <img id="fotoUsuarioCard" src="" alt="Perfil" style="position:absolute; top:16px; right:16px; width:80px; height:80px; border-radius:50%; object-fit:cover; display:none; box-shadow:0 6px 18px rgba(0,0,0,0.15);" />
        <h1><i class="bi bi-hand-thumbs-up"></i> ¡Bienvenido!</h1>
        <p id="mensajeBienvenida">Cargando datos...</p>

        <div class="welcome-content">
            <div class="user-info" id="datosUsuario" style="flex:1; min-height:180px;">
                <p><strong><i class="bi bi-person-circle"></i> Usuario:</strong> <span id="nombreUsuario">-</span></p>
                <p><strong><i class="bi bi-envelope"></i> Email:</strong> <span id="emailUsuario">-</span></p>
                <p><strong><i class="bi bi-telephone"></i> Teléfono:</strong> <span id="telefonoUsuario">-</span></p>
                <p><strong><i class="bi bi-shield"></i> Rol:</strong> <span id="rolUsuario">-</span></p>
                <div style="margin-top:12px;">
                    <label for="profilePhotoInput" class="form-label"><strong>Foto de perfil</strong></label>
                    <form id="uploadForm" method="post" enctype="multipart/form-data" style="display:flex; gap:8px; align-items:center;">
                        <input type="file" id="profilePhotoInput" name="file" accept="image/*" class="form-control form-control-sm" />
                        <button type="submit" class="btn btn-primary btn-sm" id="subirFotoBtn">Subir</button>
                        <button type="button" class="btn btn-outline-secondary btn-sm" id="cancelFotoBtn">Cancelar</button>
                    </form>
                </div>
            </div>

            <div class="profile-card">
                <img id="previewFoto" src="" alt="Preview" style="display:none;" />
                <div class="profile-actions">
                    <button id="viewFotoBtn" class="btn btn-sm btn-outline-primary" style="display:none;">Ver</button>
                </div>
            </div>
        </div>

        <div class="menu-links">
            <a href="/gimnasio" class="menu-card" style="text-decoration: none; color: inherit;">
                <i class="bi bi-dumbbell"></i>
                <h5>Ver Planes</h5>
                <p>Elige el plan que se adapte a tus objetivos</p>
            </a>
            <a href="/carrito" class="menu-card" style="text-decoration: none; color: inherit;">
                <i class="bi bi-cart3"></i>
                <h5>Mi Carrito</h5>
                <p>Revisa tus planes seleccionados</p>
            </a>
        </div>

        <!-- Sección de Mis Pedidos -->
        <div id="seccionPedidos" class="pedidos-section">
            <h2><i class="bi bi-bag-check"></i> Historial de Pedidos</h2>
            <div id="contenedorPedidos">
                <div class="sin-pedidos">
                    <i class="bi bi-inbox"></i>
                    <p>Cargando pedidos...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app.js" defer></script>
<script src="/inicio.js" defer></script>
<script src="/carrito.js" defer></script>
<script src="/navbar.js" defer></script>
<script src="/main.js" defer></script>
</body>
</html>
