<!-- Fragmento de cabecera reutilizable: muestra header de sesión o sin sesión -->
<div th:fragment="header">
    <header class="header">
        <div class="logo">
            <a th:href="@{/}"><img th:src="@{/img/logoFinal.png}" alt="Logo"></a>
        </div>
        <h1 class="title"><a th:href="@{/}" class="title-link" style="color: inherit; text-decoration: none;">IronFit</a></h1>

        <nav class="nav-links">
            <a th:href="@{/gimnasio}">Gimnasio</a>
            <a th:href="@{/tienda}">Tienda</a>
            <a th:href="@{/profesionales}">Profesionales</a>
        </nav>

        <div class="account-links">
            <a th:href="@{/carrito}" class="cart-icon-link" style="position: relative; margin-right: 15px;">
                <i class="fas fa-shopping-cart"></i>
                <span id="contadorCarrito" style="position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; display: none;">0</span>
            </a>
            <div id="header-no-session">
                <a th:href="@{/login}">Iniciar Sesión</a>
                <a th:href="@{/registro}">Registrarse</a>
            </div>

            <div id="header-session" style="display:none;">
                <a th:href="@{/admin}" id="admin-link" style="display:none; margin-right: 15px;">ADMIN</a>
                <a th:href="@{/cuenta}" class="account-profile-link">
                    <span class="user-identifier"><i class="fa-solid fa-user"></i></span>
                </a>
            </div>
        </div>

        <div class="social-icons">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
        </div>
    </header>

    <!-- Modal para mensajes -->
    <div id="customModal" class="custom-modal" style="display: none;">
        <div class="custom-modal-content">
            <div class="custom-modal-header">
                <h5 id="customModalTitle">Mensaje</h5>
                <span class="custom-modal-close">&times;</span>
            </div>
            <div class="custom-modal-body" id="customModalBody">
                Mensaje aquí
            </div>
            <div class="custom-modal-footer">
                <button id="customModalCancel" class="custom-modal-btn custom-modal-btn-secondary">Cancelar</button>
                <button id="customModalButton" class="custom-modal-btn">Aceptar</button>
            </div>
        </div>
    </div>

    <style>
        .custom-modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .custom-modal-content {
            background-color: #000000;
            border: 1px solid #858585;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            padding: 0;
            color: #FFFFFF;
        }
        .custom-modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #858585;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .custom-modal-title {
            margin: 0;
            color: #FFFFFF;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }
        .custom-modal-close {
            font-size: 28px;
            font-weight: bold;
            color: #858585;
            cursor: pointer;
        }
        .custom-modal-close:hover {
            color: #FFFFFF;
        }
        .custom-modal-body {
            padding: 20px;
            color: #FFFFFF;
            font-family: 'Roboto', sans-serif;
        }
        .custom-modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #858585;
            text-align: right;
        }
        .custom-modal-btn {
            background-color: #043EBD;
            color: #FFFFFF;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
        }
        .custom-modal-btn:hover {
            background-color: #3A6FF2;
        }
        .custom-modal-btn-secondary {
            background-color: #858585;
        }
        .custom-modal-btn-secondary:hover {
            background-color: #1C1B1B;
        }
    </style>

    <script>
        // Función para mostrar modal personalizado
        window.showCustomModal = function(message, title = 'Mensaje') {
            document.getElementById('customModalTitle').textContent = title;
            document.getElementById('customModalBody').textContent = message;
            const modal = document.getElementById('customModal');
            const cancelBtn = document.getElementById('customModalCancel');
            const btn = document.getElementById('customModalButton');
            modal.style.display = 'flex';
            cancelBtn.style.display = 'none';
            btn.textContent = 'Aceptar';
        }

        // Función para confirmación
        function showCustomConfirm(message, title = 'Confirmar') {
            return new Promise((resolve) => {
                document.getElementById('customModalTitle').textContent = title;
                document.getElementById('customModalBody').textContent = message;
                const modal = document.getElementById('customModal');
                const btn = document.getElementById('customModalButton');
                const cancelBtn = document.getElementById('customModalCancel');
                const close = document.querySelector('.custom-modal-close');
                modal.style.display = 'flex';
                cancelBtn.style.display = 'inline-block';

                const handleConfirm = () => {
                    modal.style.display = 'none';
                    btn.removeEventListener('click', handleConfirm);
                    cancelBtn.removeEventListener('click', handleCancel);
                    close.removeEventListener('click', handleCancel);
                    resolve(true);
                };
                const handleCancel = () => {
                    modal.style.display = 'none';
                    btn.removeEventListener('click', handleConfirm);
                    cancelBtn.removeEventListener('click', handleCancel);
                    close.removeEventListener('click', handleCancel);
                    resolve(false);
                };

                btn.textContent = 'Confirmar';
                btn.addEventListener('click', handleConfirm);
                cancelBtn.addEventListener('click', handleCancel);
                close.addEventListener('click', handleCancel);
            });
        }

        // Cerrar modal
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('customModal');
            const closeBtn = document.querySelector('.custom-modal-close');
            const okBtn = document.getElementById('customModalButton');
            const cancelBtn = document.getElementById('customModalCancel');

            if (closeBtn) {
                closeBtn.onclick = function() {
                    modal.style.display = 'none';
                };
            }
            if (okBtn) {
                okBtn.onclick = function() {
                    modal.style.display = 'none';
                };
            }
            if (cancelBtn) {
                cancelBtn.onclick = function() {
                    modal.style.display = 'none';
                };
            }
            if (modal) {
                modal.onclick = function(event) {
                    if (event.target === modal) {
                        modal.style.display = 'none';
                    }
                };
            }
        });

        // Mostrar header según sesión
        document.addEventListener('DOMContentLoaded', function() {
            try {
                const token = localStorage.getItem('jwt_token');
                const noSession = document.getElementById('header-no-session');
                const session = document.getElementById('header-session');
                if (token) {
                    noSession.style.display = 'none';
                    session.style.display = 'inline-flex';

                    const usuarioJSON = localStorage.getItem('usuario');
                    if (usuarioJSON) {
                        const usuario = JSON.parse(usuarioJSON);

                        // Mostrar enlace admin si es admin
                        const adminLink = document.getElementById('admin-link');
                        if (adminLink && usuario.rol && usuario.rol.toLowerCase().includes('admin')) {
                            adminLink.style.display = 'inline-flex';
                        }
                    }
                    // Llamar a actualizar contador si existe la función
                    setTimeout(() => {
                        if (typeof actualizarContadorCarrito === 'function') {
                            actualizarContadorCarrito();
                        }
                    }, 100);
                } else {
                    noSession.style.display = 'inline-flex';
                    session.style.display = 'none';
                    // Llamar a actualizar contador si existe la función
                    setTimeout(() => {
                        if (typeof actualizarContadorCarrito === 'function') {
                            actualizarContadorCarrito();
                        }
                    }, 100);
                }
            } catch (e) { console.error('Header init error', e); }
        });
    </script>
</div>
